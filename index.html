<!DOCTYPE html>
<html>
  <head>
    <title>Tiuzaan Zo – Art Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0e1235;
        font-family: 'EB Garamond', serif;
        color: #f0ebe0;
        max-width: 800px;
        margin: 0 auto;
        padding: 60px 30px;
      }

      header {
        border-bottom: 1px solid #c9a84c;
        padding-bottom: 30px;
        margin-bottom: 40px;
        text-align: center;
      }

      h1 {
        font-family: 'Playfair Display', serif;
        font-size: 56px;
        font-weight: 400;
        letter-spacing: 4px;
        color: #f2dfa8;
        margin-bottom: 12px;
      }

      .subtitle {
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #c9a84c;
      }

      nav {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin: 30px 0;
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      nav a {
        color: #f2dfa8;
        text-decoration: none;
        transition: color 0.3s;
      }

      nav a:hover {
        color: #c9a84c;
      }

      .divider {
        border: none;
        border-top: 1px solid #c9a84c;
        opacity: 0.4;
        margin: 30px 0;
      }

      .bio {
        font-size: 19px;
        line-height: 1.9;
        color: #d9d4c7;
        text-align: center;
        max-width: 620px;
        margin: 0 auto;
        padding-top: 20px;
      }
    </style>
  </head>
  <body>

    <header>
      <h1>Tiuzaan Zo</h1>
      <p class="subtitle">Drawing &nbsp;&middot;&nbsp; Painting &nbsp;&middot;&nbsp; Illustration</p>
    </header>

    <nav>
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>

    <hr class="divider">

  <p class="bio"> Tiuzaan Zo is a freelance artist who specializes in floral sketches and newspaper illustrations.</p>

  </body>
</html>
